<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WAV Transcriber</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1020;
      --panel: rgba(18, 25, 48, 0.88);
      --panel-border: rgba(148, 163, 184, 0.18);
      --text: #e5eefc;
      --muted: #9fb0d0;
      --accent: #67e8f9;
      --accent-2: #7c3aed;
      --danger: #fb7185;
      --success: #34d399;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(103, 232, 249, 0.16), transparent 34%),
        radial-gradient(circle at top right, rgba(124, 58, 237, 0.2), transparent 28%),
        linear-gradient(180deg, #0b1020 0%, #060816 100%);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .shell {
      width: min(920px, 100%);
      display: grid;
      gap: 20px;
    }

    .hero {
      display: grid;
      gap: 10px;
    }

    .eyebrow {
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 12px;
      font-weight: 700;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3.5rem);
      line-height: 1;
    }

    .subhead {
      margin: 0;
      color: var(--muted);
      max-width: 62ch;
      line-height: 1.6;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 20px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(14px);
      padding: 24px;
    }

    form {
      display: grid;
      gap: 16px;
    }

    label {
      display: grid;
      gap: 8px;
      font-weight: 600;
      color: var(--text);
    }

    .hint {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 500;
      line-height: 1.4;
    }

    input[type="file"],
    select {
      width: 100%;
      border: 1px solid rgba(148, 163, 184, 0.25);
      background: rgba(8, 12, 26, 0.9);
      color: var(--text);
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 15px;
      outline: none;
    }

    input[type="file"]::file-selector-button {
      margin-right: 16px;
      border: 0;
      border-radius: 999px;
      padding: 10px 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #08111f;
      font-weight: 700;
      cursor: pointer;
    }

    .row {
      display: grid;
      gap: 16px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    button {
      justify-self: start;
      border: 0;
      border-radius: 999px;
      padding: 14px 20px;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      color: #08111f;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 120ms ease, opacity 120ms ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.6;
      cursor: progress;
      transform: none;
    }

    .status {
      min-height: 24px;
      font-size: 14px;
      color: var(--muted);
    }

    .status.error {
      color: var(--danger);
    }

    .status.success {
      color: var(--success);
    }

    .output {
      display: grid;
      gap: 12px;
    }

    .output h2 {
      margin: 0;
      font-size: 18px;
    }

    pre {
      margin: 0;
      padding: 18px;
      border-radius: 16px;
      background: rgba(5, 8, 18, 0.95);
      border: 1px solid rgba(148, 163, 184, 0.16);
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.7;
      min-height: 140px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    .secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid rgba(148, 163, 184, 0.24);
    }

    .secondary:hover {
      background: rgba(148, 163, 184, 0.08);
    }

    .metrics {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .metric {
      border: 1px solid rgba(148, 163, 184, 0.16);
      border-radius: 16px;
      padding: 14px;
      background: rgba(5, 8, 18, 0.78);
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 8px;
    }

    .metric strong {
      font-size: 20px;
      line-height: 1.2;
    }

    @media (max-width: 720px) {
      .row {
        grid-template-columns: 1fr;
      }
      .card {
        padding: 18px;
      }
      button {
        width: 100%;
        justify-self: stretch;
      }
      .metrics {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <div class="eyebrow">Transcription Service</div>
      <h1>Upload a WAV file and get the transcript back.</h1>
      <p class="subhead">
        Choose a WAV file, submit it to the FastAPI backend, and the result will appear below once transcription completes.
      </p>
    </section>

    <section class="card">
      <form id="transcribe-form">
        <div class="row">
          <label>
            WAV file
            <input id="file" name="file" type="file" accept=".wav,audio/wav,audio/x-wav" required>
          </label>

          <label>
            Language
            <select id="language" name="language">
              <option value="as" selected>Assamese (as)</option>
              <option value="bn">Bengali (bn)</option>
              <option value="gu">Gujarati (gu)</option>
              <option value="hi">Hindi (hi)</option>
              <option value="kn">Kannada (kn)</option>
              <option value="ml">Malayalam (ml)</option>
              <option value="mr">Marathi (mr)</option>
              <option value="ne">Nepali (ne)</option>
              <option value="or">Odia (or)</option>
              <option value="pa">Punjabi (pa)</option>
              <option value="sa">Sanskrit (sa)</option>
              <option value="sd">Sindhi (sd)</option>
              <option value="ta">Tamil (ta)</option>
              <option value="te">Telugu (te)</option>
              <option value="ur">Urdu (ur)</option>
            </select>
          </label>
        </div>

        <div class="row">
          <label>
            Total requests
            <input id="load-total" name="load-total" type="number" min="1" step="1" value="100">
            <span class="hint">How many transcription requests to send in the test.</span>
          </label>

          <label>
            Requests per second
            <input id="load-rate" name="load-rate" type="number" min="1" step="1" value="10">
            <span class="hint">Launch rate. Higher values increase burstiness.</span>
          </label>
        </div>

        <div class="row">
          <label>
            Interval randomness (ms)
            <input id="load-jitter" name="load-jitter" type="number" min="0" step="1" value="0">
            <span class="hint">Adds a random +/- delay around the base interval.</span>
          </label>
        </div>

        <div class="actions">
          <button id="submit-btn" type="submit">Transcribe</button>
          <button id="load-test-btn" type="button" class="secondary">Run paced load test</button>
        </div>
        <div id="status" class="status"></div>
      </form>
    </section>

    <section class="card output">
      <h2>Transcript</h2>
      <pre id="transcript">No transcription yet.</pre>
    </section>

    <section class="card output">
      <h2>Load Test Summary</h2>
      <div class="metrics">
        <div class="metric">
          <span>Total</span>
          <strong id="metric-total">0</strong>
        </div>
        <div class="metric">
          <span>Succeeded</span>
          <strong id="metric-success">0</strong>
        </div>
        <div class="metric">
          <span>Failed</span>
          <strong id="metric-failed">0</strong>
        </div>
      </div>
      <pre id="load-test-output">No load test run yet.</pre>
    </section>
  </main>

  <script>
    const form = document.getElementById('transcribe-form');
    const fileInput = document.getElementById('file');
    const languageInput = document.getElementById('language');
    const loadTotalInput = document.getElementById('load-total');
    const loadRateInput = document.getElementById('load-rate');
    const loadJitterInput = document.getElementById('load-jitter');
    const submitBtn = document.getElementById('submit-btn');
    const loadTestBtn = document.getElementById('load-test-btn');
    const statusEl = document.getElementById('status');
    const transcriptEl = document.getElementById('transcript');
    const loadTestOutputEl = document.getElementById('load-test-output');
    const metricTotalEl = document.getElementById('metric-total');
    const metricSuccessEl = document.getElementById('metric-success');
    const metricFailedEl = document.getElementById('metric-failed');

    function setStatus(message, kind = '') {
      statusEl.textContent = message;
      statusEl.className = kind ? `status ${kind}` : 'status';
    }

    function setMetrics(total, success, failed) {
      metricTotalEl.textContent = String(total);
      metricSuccessEl.textContent = String(success);
      metricFailedEl.textContent = String(failed);
    }

    function parsePositiveInteger(value, fallback) {
      const parsed = Number.parseInt(String(value), 10);
      return Number.isFinite(parsed) && parsed > 0 ? parsed : fallback;
    }

    function parseNonNegativeInteger(value, fallback) {
      const parsed = Number.parseInt(String(value), 10);
      return Number.isFinite(parsed) && parsed >= 0 ? parsed : fallback;
    }

    function delay(ms) {
      return new Promise((resolve) => {
        window.setTimeout(resolve, ms);
      });
    }

    function getPacedDelay(baseIntervalMs, jitterMs) {
      if (jitterMs <= 0) {
        return Math.max(1, Math.round(baseIntervalMs));
      }

      const jitter = (Math.random() * 2 - 1) * jitterMs;
      return Math.max(1, Math.round(baseIntervalMs + jitter));
    }

    async function sendTranscribeRequest(file, language) {
      const formData = new FormData();
      formData.append('file', file);
      formData.append('language', language);

      const response = await fetch('/transcribe', {
        method: 'POST',
        body: formData,
      });

      const data = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(data.detail || `HTTP ${response.status}`);
      }

      return data;
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();

      const file = fileInput.files[0];
      if (!file) {
        setStatus('Please choose a WAV file first.', 'error');
        return;
      }

      submitBtn.disabled = true;
      setStatus('Uploading and transcribing...', '');
      transcriptEl.textContent = 'Waiting for transcription...';

      try {
        const data = await sendTranscribeRequest(file, languageInput.value);
        transcriptEl.textContent = data.transcript || '';
        setStatus(`Done. Request ID: ${data.request_id}`, 'success');
      } catch (error) {
        transcriptEl.textContent = 'No transcription available.';
        setStatus(error.message, 'error');
      } finally {
        submitBtn.disabled = false;
      }
    });

    loadTestBtn.addEventListener('click', async () => {
      const file = fileInput.files[0];
      if (!file) {
        setStatus('Please choose a WAV file first.', 'error');
        return;
      }

      const total = parsePositiveInteger(loadTotalInput.value, 100);
      const perSecond = parsePositiveInteger(loadRateInput.value, 10);
      const jitterMs = parseNonNegativeInteger(loadJitterInput.value, 0);
      const language = languageInput.value;
      const startedAt = performance.now();
      const baseIntervalMs = 1000 / perSecond;

      submitBtn.disabled = true;
      loadTestBtn.disabled = true;
      setMetrics(total, 0, 0);
      setStatus(
        `Running ${total} requests at up to ${perSecond} per second with ${jitterMs} ms jitter...`,
        ''
      );
      loadTestOutputEl.textContent = 'Starting load test...';

      let success = 0;
      let failed = 0;
      const failures = [];
      const results = Array.from({ length: total }, () => null);

      try {
        const requests = [];

        for (let index = 0; index < total; index += 1) {
          const requestNumber = index + 1;
          const requestPromise = sendTranscribeRequest(file, language)
            .then((data) => {
              success += 1;
              results[index] = { index: requestNumber, ok: true, requestId: data.request_id };
            })
            .catch((error) => {
              failed += 1;
              const message = error instanceof Error ? error.message : String(error);
              failures.push(`Request ${requestNumber}: ${message}`);
              results[index] = { index: requestNumber, ok: false, error: message };
            })
            .finally(() => {
              setMetrics(total, success, failed);
            });

          requests.push(requestPromise);

          if (index < total - 1) {
            await delay(getPacedDelay(baseIntervalMs, jitterMs));
          }
        }

        await Promise.all(requests);
        const elapsedMs = Math.round(performance.now() - startedAt);
        const preview = results
          .map((result) => {
            if (!result) {
              return '#?: pending';
            }
            if (result.ok) {
              return `#${result.index}: ok (${result.requestId})`;
            }
            return `#${result.index}: failed (${result.error})`;
          })
          .join('\n');

        loadTestOutputEl.textContent = [
          `Completed ${total} requests in ${elapsedMs} ms`,
          `Launch rate: ${perSecond}/sec`,
          `Base interval: ${Math.round(baseIntervalMs)} ms`,
          `Jitter: +/-${jitterMs} ms`,
          `Succeeded: ${success}`,
          `Failed: ${failed}`,
          '',
          'Results:',
          preview,
          failures.length ? '' : 'No failures recorded.',
          failures.length ? 'Failures:' : '',
          ...failures,
        ]
          .filter(Boolean)
          .join('\n');

        setStatus(
          `Load test finished in ${elapsedMs} ms. Success: ${success}. Failed: ${failed}.`,
          failed === 0 ? 'success' : 'error'
        );
      } catch (error) {
        const message = error instanceof Error ? error.message : String(error);
        loadTestOutputEl.textContent = message;
        setStatus(message, 'error');
      } finally {
        submitBtn.disabled = false;
        loadTestBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
