<!doctype html>
<html>
  <head>
    <title>Streaming ASR Client (Opus)</title>
    <style>
      body {
        font-family: monospace;
        padding: 20px;
      }
      button {
        margin-right: 10px;
        padding: 8px 16px;
        font-size: 14px;
      }
      #output {
        margin-top: 20px;
        background: #111;
        color: #0f0;
        font-size: 14px;
        padding: 12px;
        height: 300px;
        overflow-y: auto;
        white-space: pre-wrap;
      }
      #mimeInfo {
        font-size: 12px;
        color: #888;
        margin-top: 6px;
      }
    </style>
  </head>
  <body>
    <h2>Streaming ASR — Opus / WebM</h2>

    <button id="startBtn">Start Recording</button>
    <button id="stopBtn" disabled>Stop Recording</button>

    <select id="languageSelect">
      <option value="as">Assamese (as)</option>
      <option value="bn">Bengali (bn)</option>
      <option value="brx">Bodo (brx)</option>
      <option value="hi">Hindi (hi)</option>
      <option value="ne">Nepali (ne)</option>
    </select>

    <div id="mimeInfo"></div>
    <div id="output"></div>

    <script>
      // ─────────────────────────────────────────────
      // Config
      // ─────────────────────────────────────────────
      const WS_URL = `${location.protocol === "https:" ? "wss" : "ws"}://${location.host}/ws`;
      const TIMESLICE_MS = 100; // ondataavailable fires every N ms
      const MIC_CONSTRAINTS = {
        audio: {
          channelCount: 1,
          echoCancellation: true,
          noiseSuppression: true,
          autoGainControl: true,
        },
      };

      // Preferred MIME types in priority order. The server decodes WebM.
      const MIME_PRIORITY = [
        "audio/webm;codecs=opus",
        "audio/webm",
      ];

      // ─────────────────────────────────────────────
      // State
      // ─────────────────────────────────────────────
      let websocket, mediaRecorder, stream;

      // ─────────────────────────────────────────────
      // Helpers
      // ─────────────────────────────────────────────
      const outputEl = document.getElementById("output");
      const mimeEl = document.getElementById("mimeInfo");
      const startBtn = document.getElementById("startBtn");
      const stopBtn = document.getElementById("stopBtn");
      const languageSelect = document.getElementById("languageSelect");

      let renderedText = "";
      let typingQueue = [];
      let typing = false;

      async function renderTyping(text) {
        typingQueue.push(text);

        if (typing) return;

        typing = true;

        while (typingQueue.length > 0) {
          const chunk = typingQueue.shift();

          for (const char of chunk) {
            renderedText += char;

            outputEl.textContent = renderedText;

            outputEl.scrollTop = outputEl.scrollHeight;

            // typing speed
            await new Promise((r) => setTimeout(r, 10));
          }

          renderedText += " ";
        }

        typing = false;
      }

      function log(msg) {
        const ts = new Date().toISOString().substr(11, 12);
        outputEl.textContent += `[${ts}] ${msg}\n`;
        outputEl.scrollTop = outputEl.scrollHeight;
      }

      function detectMime() {
        for (const mime of MIME_PRIORITY) {
          if (MediaRecorder.isTypeSupported(mime)) return mime;
        }
        return ""; // let the browser pick
      }

      function setRecordingUi(isRecording) {
        languageSelect.disabled = isRecording;
        startBtn.disabled = isRecording;
        stopBtn.disabled = !isRecording;
      }

      function resetRecorderState() {
        if (stream) {
          stream.getTracks().forEach((t) => t.stop());
          stream = null;
        }

        if (websocket?.readyState === WebSocket.OPEN || websocket?.readyState === WebSocket.CONNECTING) {
          websocket.close();
        }

        websocket = null;
        mediaRecorder = null;
        setRecordingUi(false);
      }

      async function getMicrophoneStream() {
        if (!window.isSecureContext) {
          throw new Error(
            "Chrome mobile requires HTTPS for microphone access. Use https:// or localhost.",
          );
        }

        if (!navigator.mediaDevices?.getUserMedia) {
          throw new Error("This browser does not expose microphone recording APIs.");
        }

        try {
          return await navigator.mediaDevices.getUserMedia(MIC_CONSTRAINTS);
        } catch (err) {
          if (err.name === "OverconstrainedError" || err.name === "ConstraintNotSatisfiedError") {
            log("Retrying microphone with basic audio constraints");
            return navigator.mediaDevices.getUserMedia({ audio: true });
          }

          throw err;
        }
      }

      // ─────────────────────────────────────────────
      // Core
      // ─────────────────────────────────────────────
      async function startRecording() {
        setRecordingUi(true);

        try {
          // 1. Microphone. Do this first so Chrome mobile sees it as part of the tap.
          stream = await getMicrophoneStream();

          // 2. WebSocket

          const selectedLanguage = languageSelect.value;
          websocket = new WebSocket(
            `${WS_URL}?language=${encodeURIComponent(selectedLanguage)}`,
          );

          websocket.binaryType = "arraybuffer";

          websocket.onopen = () => log("WebSocket connected");
          websocket.onmessage = async (e) => {
            try {
              const msg = JSON.parse(e.data);

              if (msg.type === "transcription") {
                const text = msg.text?.trim();

                if (!text) return;

                await renderTyping(text);
              } else if (msg.type === "error") {
                log(`ERROR: ${msg.message}`);
              }
            } catch (err) {
              // fallback for plain text messages
              await renderTyping(e.data);
            }
          };
          websocket.onerror = () => log("WebSocket error — check console");
          websocket.onclose = () => log("WebSocket closed");

          // Wait for the socket to be open before starting the recorder
          await new Promise((resolve, reject) => {
            websocket.addEventListener("open", resolve, { once: true });
            websocket.addEventListener("error", reject, { once: true });
          });

          // 3. Detect MIME
          const mimeType = detectMime();
          if (!mimeType) {
            throw new Error("This browser cannot record WebM/Opus audio required by the server.");
          }

          const recorderOptions = { mimeType };
          mimeEl.textContent = `Using: ${mimeType}`;
          log(`MIME type: ${mimeType}`);

          // 4. MediaRecorder
          mediaRecorder = new MediaRecorder(stream, recorderOptions);

          let chunkIndex = 0;

          mediaRecorder.ondataavailable = async (event) => {
            if (event.data.size === 0) return;
            if (websocket.readyState !== WebSocket.OPEN) return;

            const buffer = await event.data.arrayBuffer();
            websocket.send(buffer);

            // Light debug — remove in production
            // log(`→ sent chunk #${chunkIndex++}  (${buffer.byteLength} bytes)`);
          };

          mediaRecorder.onerror = (e) => log(`MediaRecorder error: ${e.error}`);

          mediaRecorder.onstart = () => {
            log("MediaRecorder started");
            setRecordingUi(true);
          };

          mediaRecorder.onstop = () => {
            log("MediaRecorder stopped");
            setRecordingUi(false);
          };

          // timeslice fires ondataavailable every TIMESLICE_MS milliseconds
          mediaRecorder.start(TIMESLICE_MS);
        } catch (err) {
          log(`Start failed: ${err.message || err.name || err}`);
          resetRecorderState();
        }
      }

      function stopRecording() {
        if (mediaRecorder?.state !== "inactive") mediaRecorder.stop();
        stream?.getTracks().forEach((t) => t.stop());
        stream = null;
        // Give the server a moment to flush before closing the socket
        setTimeout(() => websocket?.close(), 300);
      }

      startBtn.onclick = startRecording;
      stopBtn.onclick = stopRecording;
    </script>
  </body>
</html>
