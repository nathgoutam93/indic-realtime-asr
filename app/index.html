<!doctype html>
<html lang="en">
<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Streaming ASR Client</title>

  <style>

    :root {
      --bg-color: #0f172a;
      --card-bg: #1e293b;
      --text-primary: #f8fafc;
      --text-muted: #94a3b8;
      --accent-primary: #3b82f6;
      --accent-success: #10b981;
      --accent-danger: #ef4444;
      --border-color: #334155;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {

      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        Roboto,
        Helvetica,
        Arial,
        sans-serif;

      background-color: var(--bg-color);
      color: var(--text-primary);

      display: flex;
      justify-content: center;
      align-items: center;

      min-height: 100vh;

      padding: 20px;
    }

    .container {

      background: var(--card-bg);

      width: 100%;
      max-width: 550px;

      border-radius: 16px;

      padding: 32px;

      box-shadow:
        0 10px 25px -5px rgba(0, 0, 0, 0.3),
        0 8px 10px -6px rgba(0, 0, 0, 0.3);

      border: 1px solid var(--border-color);
    }

    h2 {

      font-size: 1.5rem;
      font-weight: 600;

      margin-bottom: 24px;

      text-align: center;

      letter-spacing: -0.025em;
    }

    .controls-row {

      display: flex;
      align-items: center;
      justify-content: space-between;

      gap: 16px;

      margin-bottom: 24px;

      background: rgba(0, 0, 0, 0.15);

      padding: 12px 16px;

      border-radius: 12px;

      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .mic-control {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #micBtn {

      width: 48px;
      height: 48px;

      border-radius: 50%;

      border: none;

      cursor: pointer;

      display: flex;
      justify-content: center;
      align-items: center;

      transition: all 0.2s ease;

      background-color: var(--accent-primary);

      color: white;

      position: relative;

      outline: none;
    }

    #micBtn:hover {
      transform: scale(1.04);
    }

    #micBtn:active {
      transform: scale(0.98);
    }

    #micBtn svg {
      width: 22px;
      height: 22px;
      fill: currentColor;
    }

    #micBtn.recording {
      background-color: var(--accent-danger);
    }

    #micBtn.recording::after {

      content: '';

      position: absolute;

      width: 100%;
      height: 100%;

      border-radius: 50%;

      background-color: var(--accent-danger);

      opacity: 0.4;

      z-index: -1;

      animation: pulse 1.6s infinite ease-out;
    }

    @keyframes pulse {

      0% {
        transform: scale(1);
        opacity: 0.4;
      }

      100% {
        transform: scale(1.8);
        opacity: 0;
      }
    }

    .status-badge {

      font-size: 0.85rem;
      font-weight: 500;

      color: var(--text-muted);

      display: flex;
      align-items: center;

      gap: 6px;
    }

    .status-dot {

      width: 8px;
      height: 8px;

      border-radius: 50%;

      background-color: #64748b;

      transition: background-color 0.3s ease;
    }

    .status-badge.connecting .status-dot {

      background-color: #eab308;

      animation: blink 1s infinite alternate;
    }

    .status-badge.listening .status-dot {
      background-color: var(--accent-success);
    }

    @keyframes blink {

      0% {
        opacity: 0.3;
      }

      100% {
        opacity: 1;
      }
    }

    select {

      background-color: var(--bg-color);

      color: var(--text-primary);

      border: 1px solid var(--border-color);

      padding: 10px 14px;

      border-radius: 8px;

      font-size: 0.9rem;

      outline: none;

      cursor: pointer;

      font-family: inherit;
    }

    select:focus {
      border-color: var(--accent-primary);
    }

    select:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .output-container {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .output-header {

      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .output-label {

      font-size: 0.8rem;

      text-transform: uppercase;

      letter-spacing: 0.05em;

      color: var(--text-muted);

      font-weight: 600;
    }

    .action-buttons {
      display: flex;
      gap: 8px;
    }

    .text-action-btn {

      background: rgba(255, 255, 255, 0.05);

      border: 1px solid var(--border-color);

      color: var(--text-muted);

      padding: 4px 10px;

      border-radius: 6px;

      font-size: 0.75rem;

      font-weight: 500;

      cursor: pointer;

      transition: all 0.15s ease;
    }

    .text-action-btn:hover {

      background: rgba(255, 255, 255, 0.1);

      color: var(--text-primary);

      border-color: #475569;
    }

    .text-action-btn:active {
      transform: scale(0.97);
    }

    #output {

      background-color: rgba(0, 0, 0, 0.2);

      color: var(--text-primary);

      font-size: 1.05rem;

      line-height: 1.6;

      padding: 20px;

      height: 280px;

      overflow-y: auto;

      white-space: pre-wrap;

      border-radius: 12px;

      border: 1px solid var(--border-color);
    }

    #output::-webkit-scrollbar {
      width: 6px;
    }

    #output::-webkit-scrollbar-track {
      background: transparent;
    }

    #output::-webkit-scrollbar-thumb {

      background: var(--border-color);

      border-radius: 4px;
    }

    #mimeInfo {

      font-size: 0.75rem;

      color: var(--text-muted);

      text-align: right;

      margin-top: 8px;

      font-family: monospace;
    }

    .error-text {
      color: var(--accent-danger);
      font-style: italic;
    }

  </style>

</head>

<body>

  <div class="container">

    <h2>Streaming ASR Engine</h2>

    <div class="controls-row">

      <div class="mic-control">

        <button
          id="micBtn"
          title="Toggle Recording"
        >

          <svg
            viewBox="0 0 24 24"
          >
            <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1 9h2c0 .55-.45 1-1 1s-1-.45-1-1zm6-12c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-2.08c3.39-.49 6-3.39 6-6.92h-2z"/>
          </svg>

        </button>

        <div
          id="statusBadge"
          class="status-badge"
        >

          <span class="status-dot"></span>

          <span id="statusText">
            Idle
          </span>

        </div>

      </div>

      <select id="languageSelect">

        <option value="as" selected>
          Assamese (as)
        </option>

        <option value="bn">
          Bengali (bn)
        </option>

        <option value="brx">
          Bodo (brx)
        </option>

        <option value="hi">
          Hindi (hi)
        </option>

        <option value="ne">
          Nepali (ne)
        </option>

      </select>

    </div>

    <div class="output-container">

      <div class="output-header">

        <div class="output-label">
          Live Transcription
        </div>

        <div class="action-buttons">

          <button
            id="copyBtn"
            class="text-action-btn"
          >
            Copy
          </button>

          <button
            id="clearBtn"
            class="text-action-btn"
          >
            Clear
          </button>

        </div>

      </div>

      <div id="output"></div>

    </div>

    <div id="mimeInfo">
      Ready
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>

  <script type="module">
    
    import { MicVAD } from "https://cdn.jsdelivr.net/npm/@ricky0123/vad-web/+esm";
    // ============================================
    // ONNX Runtime config
    // ============================================

    ort.env.wasm.numThreads = 1;

    ort.env.wasm.simd = true;

    ort.env.wasm.wasmPaths = "https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/";

    // ====================================================
    // Config
    // ====================================================

    const WS_URL =
      `${location.protocol === "https:" ? "wss" : "ws"}://${location.host}/ws`;

    const TIMESLICE_MS = 250;

    const MIC_CONSTRAINTS = {

      audio: {

        channelCount: 1,

        echoCancellation: true,

        noiseSuppression: true,

        autoGainControl: true,
      },
    };

    const MIME_PRIORITY = [
      "audio/webm;codecs=opus",
      "audio/webm",
    ];


    // ====================================================
    // State
    // ====================================================

    let websocket;
    let mediaRecorder;
    let stream;
    let vad;

    let isRecordingState = false;
    let isSpeechActive = false;
    let vadHeartbeatTimer;

    let finalizedTranscript = "";
    let livePartial = "";


    // ====================================================
    // Elements
    // ====================================================

    const outputEl =
      document.getElementById("output");

    const mimeEl =
      document.getElementById("mimeInfo");

    const micBtn =
      document.getElementById("micBtn");

    const copyBtn =
      document.getElementById("copyBtn");

    const clearBtn =
      document.getElementById("clearBtn");

    const statusBadge =
      document.getElementById("statusBadge");

    const statusText =
      document.getElementById("statusText");

    const languageSelect =
      document.getElementById("languageSelect");


    // ====================================================
    // UI
    // ====================================================

    function updateUiState(state) {

      if (state === 'idle') {

        isRecordingState = false;

        micBtn.classList.remove("recording");

        statusBadge.className =
          "status-badge";

        statusText.textContent =
          "Idle";

        languageSelect.disabled = false;
      }

      else if (state === 'connecting') {

        isRecordingState = true;

        micBtn.classList.add("recording");

        statusBadge.className =
          "status-badge connecting";

        statusText.textContent =
          "Connecting...";

        languageSelect.disabled = true;
      }

      else if (state === 'listening') {

        isRecordingState = true;

        micBtn.classList.add("recording");

        statusBadge.className =
          "status-badge listening";

        statusText.textContent =
          isSpeechActive
            ? "Speaking"
            : "Listening";

        languageSelect.disabled = true;
      }
    }


    // ====================================================
    // Transcript
    // ====================================================

    function renderTranscript() {

      let text =
        finalizedTranscript;

      if (livePartial) {

        if (text.length > 0) {
          text += "\n";
        }

        text += livePartial;
      }

      outputEl.textContent =
        text;

      outputEl.scrollTop =
        outputEl.scrollHeight;
    }


    // ====================================================
    // Errors
    // ====================================================

    function displaySystemError(msg) {

      const errorSpan =
        document.createElement("span");

      errorSpan.className =
        "error-text";

      errorSpan.textContent =
        `\n[System Error: ${msg}]\n`;

      outputEl.appendChild(errorSpan);

      outputEl.scrollTop =
        outputEl.scrollHeight;
    }


    // ====================================================
    // Mime
    // ====================================================

    function detectMime() {

      for (const mime of MIME_PRIORITY) {

        if (
          MediaRecorder.isTypeSupported(mime)
        ) {

          return mime;
        }
      }

      return "";
    }


    // ====================================================
    // Reset
    // ====================================================

    async function resetRecorderState() {

      try {

        if (vad) {

          vad.pause();

          vad = null;
        }

        if (vadHeartbeatTimer) {

          clearInterval(vadHeartbeatTimer);

          vadHeartbeatTimer = null;
        }

        if (
          mediaRecorder
          && mediaRecorder.state !== "inactive"
        ) {

          mediaRecorder.stop();
        }

        if (stream) {

          stream
            .getTracks()
            .forEach((t) => t.stop());

          stream = null;
        }

        if (
          websocket?.readyState === WebSocket.OPEN
          || websocket?.readyState === WebSocket.CONNECTING
        ) {

          websocket.close();
        }

      } catch (err) {

        console.error(err);
      }

      websocket = null;
      mediaRecorder = null;

      isSpeechActive = false;

      updateUiState('idle');
    }


    // ====================================================
    // Mic
    // ====================================================

    async function getMicrophoneStream() {

      if (!window.isSecureContext) {

        throw new Error(
          "Microphone capture requires HTTPS or localhost."
        );
      }

      return navigator
        .mediaDevices
        .getUserMedia(MIC_CONSTRAINTS);
    }


    // ====================================================
    // MediaRecorder start
    // ====================================================

    function beginMediaRecorder() {

      if (!mediaRecorder)
        return;

      if (
        mediaRecorder.state === "recording"
      ) {
        return;
      }

      mediaRecorder.start(
        TIMESLICE_MS
      );
    }


    // ====================================================
    // MediaRecorder stop
    // ====================================================

    function endMediaRecorder() {

      if (!mediaRecorder)
        return;

      if (
        mediaRecorder.state === "inactive"
      ) {
        return;
      }

      mediaRecorder.stop();
    }


    // ====================================================
    // Start Recording
    // ====================================================

    async function startRecording() {

      updateUiState('connecting');

      try {

        stream =
          await getMicrophoneStream();

        const selectedLanguage =
          languageSelect.value;

        websocket = new WebSocket(
          `${WS_URL}?language=${encodeURIComponent(selectedLanguage)}`
        );

        websocket.binaryType =
          "arraybuffer";


        // ===============================================
        // websocket messages
        // ===============================================

        websocket.onmessage = (e) => {

          try {

            const msg =
              JSON.parse(e.data);

            if (
              msg.type === "transcription"
            ) {

              const text =
                msg.text?.trim();

              if (!text)
                return;

              if (msg.is_partial) {

                livePartial = text;

                renderTranscript();

                return;
              }

              if (
                finalizedTranscript.length > 0
              ) {

                finalizedTranscript += " ";
              }

              finalizedTranscript += text;

              livePartial = "";

              renderTranscript();
            }

            else if (
              msg.type === "error"
            ) {

              displaySystemError(
                msg.message
              );
            }

          } catch (err) {

            console.error(err);
          }
        };


        websocket.onerror = () => {

          displaySystemError(
            "WebSocket transport failure."
          );
        };


        websocket.onclose = () => {

          resetRecorderState();
        };


        await new Promise(
          (resolve, reject) => {

            websocket.addEventListener(
              "open",
              resolve,
              { once: true }
            );

            websocket.addEventListener(
              "error",
              reject,
              { once: true }
            );
          }
        );


        // ===============================================
        // mime
        // ===============================================

        const mimeType =
          detectMime();

        if (!mimeType) {

          throw new Error(
            "No supported audio mime."
          );
        }

        mimeEl.textContent =
          `Codec: ${mimeType}`;


        // ===============================================
        // media recorder
        // ===============================================

        mediaRecorder =
          new MediaRecorder(
            stream,
            { mimeType }
          );


        mediaRecorder.ondataavailable =
          async (event) => {

            if (event.data.size === 0)
              return;

            if (
              websocket?.readyState
              !== WebSocket.OPEN
            ) {
              return;
            }

            const buffer =
              await event.data.arrayBuffer();

            websocket.send(buffer);
          };


        mediaRecorder.onerror = (e) => {

          displaySystemError(
            `MediaRecorder error: ${e.error}`
          );
        };


        // ===============================================
        // VAD
        // ===============================================

        vad = await MicVAD.new({

          stream,

          baseAssetPath:
            "https://cdn.jsdelivr.net/npm/@ricky0123/vad-web/dist/",

          onnxWASMBasePath:
            "https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/",

          positiveSpeechThreshold: 0.8,

          negativeSpeechThreshold: 0.5,

          redemptionFrames: 8,

          preSpeechPadFrames: 6,

          minSpeechFrames: 3,

          onSpeechStart: () => {

            console.log(
              "Speech start"
            );

            isSpeechActive = true;

            updateUiState('listening');
          },

          onSpeechEnd: () => {

            console.log(
              "Speech end"
            );

            isSpeechActive = false;

            updateUiState('listening');
          },
        });


        vad.start();

        vadHeartbeatTimer = setInterval(
          () => {
            if (isRecordingState) {
              updateUiState('listening');
            }
          },
          1000
        );

        beginMediaRecorder();

        updateUiState('listening');

      } catch (err) {

        displaySystemError(
          err.message
          || err.name
          || "Unknown failure"
        );

        console.error(err);

        resetRecorderState();
      }
    }


    // ====================================================
    // Stop Recording
    // ====================================================

    async function stopRecording() {

      await resetRecorderState();
    }


    // ====================================================
    // Buttons
    // ====================================================

    micBtn.onclick = function () {

      if (!isRecordingState) {

        startRecording();

      } else {

        stopRecording();
      }
    };


    clearBtn.onclick = function () {

      finalizedTranscript = "";
      livePartial = "";

      outputEl.textContent = "";
    };


    copyBtn.onclick = async function () {

      const textToCopy =
        outputEl.textContent.trim();

      if (!textToCopy)
        return;

      try {

        await navigator
          .clipboard
          .writeText(textToCopy);

        const originalText =
          copyBtn.textContent;

        copyBtn.textContent =
          "Copied!";

        setTimeout(() => {

          copyBtn.textContent =
            originalText;

        }, 1500);

      } catch (err) {

        console.error(
          "Copy failed",
          err
        );
      }
    };

  </script>

</body>
</html>
